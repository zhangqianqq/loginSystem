<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .test-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 500px;
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 16px;
        }
        .status {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .info p {
            margin: 8px 0;
            color: #666;
        }
        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div class="test-card">
        <h1>前端服务测试</h1>

        <div class="status success">
            ✅ 前端服务正常运行
        </div>

        <div class="info">
            <p><strong>服务地址：</strong><span id="serviceUrl">-</span></p>
            <p><strong>Node 版本：</strong><span id="nodeVersion">-</span></p>
            <p><strong>React 状态：</strong><span id="reactStatus">检查中...</span></p>
        </div>

        <button class="btn" onclick="openLoginPage()">打开登录页面</button>
    </div>

    <script>
        // 显示服务地址
        document.getElementById('serviceUrl').textContent = window.location.href;

        // 显示 Node 版本（通过 API）
        fetch('/api/base-config')
            .then(r => r.json())
            .then(data => {
                if (data.base) {
                    document.getElementById('nodeVersion').textContent = 'Vite ' + data.base;
                }
            })
            .catch(() => {
                document.getElementById('nodeVersion').textContent = '无法获取';
            });

        // 测试 React 是否加载
        setTimeout(() => {
            if (typeof React !== 'undefined') {
                document.getElementById('reactStatus').textContent = '✅ React 已加载';
                document.getElementById('reactStatus').style.color = '#28a745';
            } else {
                document.getElementById('reactStatus').textContent = '❌ React 未加载';
                document.getElementById('reactStatus').style.color = '#dc3545';
            }
        }, 500);

        function openLoginPage() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
